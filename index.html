<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Color Walking 🎨</title>
  <meta name="version" content="v3-1781264139"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="logo">🎨 Color Walking</span>
    <span class="header-sub">和朋友一起记录世界的颜色</span>
  </div>
  <div class="header-right">
    <button class="tab-btn active" onclick="showPage('map')">🗺️ 地图</button>
    <button class="tab-btn" onclick="showPage('wall')">🖼️ 照片墙</button>
    <button class="btn-upload-main" onclick="openUpload()">📸 上传照片</button>
  </div>
</header>

<!-- 地图页面 -->
<div id="page-map" class="page active">
  <div id="map"></div>
  <div class="map-legend" id="map-legend">
    <div class="legend-title">📍 大家的足迹</div>
  </div>
</div>

<!-- 照片墙页面 -->
<div id="page-wall" class="page hidden">
  <div class="wall-header">
    <h2>🖼️ 今日照片墙</h2>
    <button class="btn-gen-wall" onclick="generateWall()">✨ 生成照片墙</button>
  </div>
  <div id="wall-grid" class="wall-grid"></div>
</div>

<!-- 上传弹窗 -->
<div id="upload-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📸 上传照片</h3>
      <button class="modal-close" onclick="closeUpload()">✕</button>
    </div>

    <!-- 两个上传按钮 -->
    <div class="upload-buttons-row">
      <label class="upload-btn-option" for="file-camera">
        📷 拍照
        <input type="file" id="file-camera" accept="image/*" capture="environment" onchange="handleFile(event)"/>
      </label>
      <label class="upload-btn-option" for="file-album">
        🖼️ 从相册选
        <input type="file" id="file-album" accept="image/*" onchange="handleFile(event)"/>
      </label>
    </div>

    <img id="preview-img" class="preview-img hidden"/>

    <div class="upload-location">
      <div class="location-status" id="location-status"></div>
      <div id="mini-map" class="mini-map hidden"></div>
      <button class="btn-manual-location hidden" id="btn-manual" onclick="enableManualLocation()">📌 手动标记位置</button>
    </div>

    <div class="upload-desc">
      <input type="text" id="input-desc" placeholder="描述一下这个瞬间～" maxlength="50"/>
    </div>
    <button class="btn-publish" onclick="publishPhoto()">发布 🎉</button>
  </div>
</div>

<!-- 聊天窗口 -->
<div id="chat-bubble" class="chat-bubble" onclick="toggleChat()">💬</div>

<div id="chat-window" class="chat-window hidden">
  <div class="chat-header">
    <span>💬 群聊</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-area">
    <select id="chat-to" class="chat-to">
      <option value="all">📢 @全员</option>
    </select>
    <input type="text" id="chat-input" class="chat-input" placeholder="说点什么～" maxlength="100"/>
    <button class="chat-send" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- 照片详情弹窗 -->
<div id="photo-modal" class="modal hidden">
  <div class="modal-content photo-detail">
    <button class="modal-close" onclick="closePhoto()">✕</button>
    <img id="detail-img" src="" alt=""/>
    <div class="detail-info">
      <span class="detail-desc" id="detail-desc"></span>
      <span class="detail-time" id="detail-time"></span>
      <div class="detail-like-row">
        <button class="btn-like" id="detail-like-btn">🤍 点个赞</button>
        <span class="like-count" id="detail-like-count"></span>
      </div>
      <!-- 评论区 -->
      <div class="comments-section">
        <div class="comments-title">💬 评论</div>
        <div class="comments-list" id="comments-list"></div>
        <div class="comment-input-row">
          <input type="text" id="comment-input" class="comment-input" placeholder="说点什么～" maxlength="80"/>
          <button class="comment-send" onclick="submitComment()">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Color Walking 🎨</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- 昵称入口 -->
<div id="room-gate" class="room-gate">
  <div class="room-gate-card">
    <div class="room-gate-logo">🎨</div>
    <h1 class="room-gate-title">Color Walking</h1>
    <p class="room-gate-sub">和朋友一起记录世界的颜色</p>
    <div class="room-gate-name">
      <label>你的昵称</label>
      <input id="input-nickname" type="text" placeholder="输入你的名字" maxlength="10"/>
    </div>
    <button class="btn-create-room" onclick="enterApp()">开始 🎨</button>
  </div>
</div>

<!-- 主界面 -->
<div id="main-app" class="main-app hidden">

<header class="header">
  <div class="header-left">
    <span class="logo">🎨 Color Walking</span>
    <span class="header-sub" id="header-nick"></span>
  </div>
  <div class="header-right">
    <button class="tab-btn active" onclick="showPage('map')">🗺️ 地图</button>
    <button class="tab-btn" onclick="showPage('wall')">🖼️ 照片墙</button>
    <button class="btn-upload-main" onclick="openUpload()">📸 上传照片</button>
  </div>
</header>

<!-- 地图页面 -->
<div id="page-map" class="page active">
  <div id="map"></div>
  <div class="map-legend" id="map-legend">
    <div class="legend-title">📍 大家的足迹</div>
  </div>
</div>

<!-- 照片墙页面 -->
<div id="page-wall" class="page hidden">
  <div class="wall-header">
    <h2>🖼️ 今日照片墙</h2>
    <button class="btn-gen-wall" onclick="generateWall()">✨ 生成照片墙</button>
  </div>
  <div id="wall-grid" class="wall-grid"></div>
</div>

<!-- 上传弹窗 -->
<div id="upload-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📸 上传照片</h3>
      <button class="modal-close" onclick="closeUpload()">✕</button>
    </div>
    <div class="upload-preview">
      <label for="file-input" class="upload-area">
        <span>点击选择照片</span>
        <span class="upload-hint">支持 JPG / PNG，会自动读取GPS位置</span>
      </label>
      <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleFile(event)"/>
      <img id="preview-img" class="preview-img hidden"/>
    </div>
    <div class="upload-location">
      <div class="location-status" id="location-status">📍 等待读取GPS...</div>
      <div id="mini-map" class="mini-map hidden"></div>
      <button class="btn-manual-location hidden" id="btn-manual" onclick="enableManualLocation()">📌 手动标记位置</button>
    </div>
    <div class="upload-desc">
      <input type="text" id="input-desc" placeholder="描述一下这个瞬间～" maxlength="50"/>
    </div>
    <button class="btn-publish" onclick="publishPhoto()">发布 🎉</button>
  </div>
</div>

<!-- 照片详情弹窗 -->
<div id="photo-modal" class="modal hidden">
  <div class="modal-content photo-detail">
    <button class="modal-close" onclick="closePhoto()">✕</button>
    <img id="detail-img" src="" alt=""/>
    <div class="detail-info">
      <span class="detail-author" id="detail-author"></span>
      <span class="detail-desc" id="detail-desc"></span>
      <span class="detail-time" id="detail-time"></span>
    </div>
  </div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
<script src="app.js"></script>
</body>
</html>
